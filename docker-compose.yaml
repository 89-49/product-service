services:
  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-docker.io/jin4041}/product-service:${VERSION:-latest}
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_KAFKA_SSL_TRUST_STORE_LOCATION=file:/app/ssl/kafka.server.truststore.jks
      - SPRING_PROFILES_ACTIVE=topics,kafka
      - CONFIG_SERVER=http://${CONFIG_SERVER_HOST}:13100
      - host=${host:-pgsg}
      - port=${port:-5432}
      - dbname=${dbname:-pgsg}
      - username=${username}
      - password=${password}
      - BOOTSTRAP_SERVERS=${BOOTSTRAP_SERVERS}
      - TRUST_STORE_PASSWORD=${TRUST_STORE_PASSWORD}
      - ZIPKIN_ENDPOINT=http://pgsg-zipkin:9411/api/v2/spans
    volumes:
      - ./ssl:/app/ssl
      - ${LOG_DIR:-./logs}:/app/logs
#    depends_on:
#      product-db:
#          condition: service_healthy
    networks:
      - pgsg-network


