services:
  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-docker.io/jin4041}/product-service:${VERSION:-latest}
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_KAFKA_SSL_TRUST_STORE_LOCATION=file:/app/ssl/kafka.server.truststore.jks
      - SPRING_PROFILES_ACTIVE=topics,kafka
      - CONFIG_SERVER=http://${CONFIG_SERVER_HOST:-34.50.50.170}:13100
      - host=${host:-pgsg}
      - port=${port:-5432}
      - dbname=${dbname:-pgsg}
      - username=${username}
      - password=${password}
      - BOOTSTRAP_SERVERS=${BOOTSTRAP_SERVERS}
      - TRUST_STORE_PASSWORD=${TRUST_STORE_PASSWORD}
      - ZIPKIN_ENDPOINT=http://pgsg-zipkin:9411/api/v2/spans
    volumes:
      - ./ssl:/app/ssl
      - /home/ubuntu/product/logs:/app/logs
    depends_on:
      product-db:
          condition: service_healthy
    networks:
      - pgsg-network
      - default


  product-db:
    image: postgres:16
    container_name: product-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${dbname:-pgsg}
      - POSTGRES_USER=${username}
      - POSTGRES_PASSWORD=${password}
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USERNAME:-pgsg}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  pgsg-network:
    external: true
  default:
    driver: bridge

volumes:
  product-db-data:
