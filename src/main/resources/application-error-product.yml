error:
  configs:
    ProductNotFoundException:
      code: "P001"
      message: "해당 상품을 찾을 수 없습니다."
      status: 404

    PriceValidateException:
      code: "P002"
      message: "상품가격은 0보다 커야합니다."
      status: 400

    ScheduleValidateException:
      code: "P003"
      message: "종료 시간은 시작 시간 이후여야 합니다."
      status: 400

    StartTimeValidateException:
      code: "P004"
      message: "시작 시간은 현재 시간 이후여야 합니다."
      status: 400

    InvalidStatusException:
      code: "P005"
      message: "허용되지 않은 상태 변화 요청입니다."
      status: 409

    InvalidChangeScheduleException:
      code: "P006"
      message: "이미 시작되었거나 종료된 예약은 스케줄을 변경할 수 없습니다."
      status: 409
