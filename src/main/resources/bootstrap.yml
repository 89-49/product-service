spring:
  application:
    name: product-service

  cloud:
    config:
      uri: ${CONFIG_SERVER}
      name: product-service,common
      profile: topics,kafka
      override-none: true

  config:
    import:
      - optional:configserver:${CONFIG_SERVER}

logging:
  level:
    org.hibernate.orm.connections.pooling: WARN
    org.hibernate.SQL: WARN