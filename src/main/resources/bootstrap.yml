spring:
  application:
    name: product-service

  cloud:
    config:
      uri: http://${CONFIG_SERVER_HOST}:13100
      name: product-service,common
      override-none: true

  config:
    import:
      - optional:configserver:http://${CONFIG_SERVER_HOST}:13100

logging:
  level:
    org.hibernate.orm.connections.pooling: WARN
    org.hibernate.SQL: WARN